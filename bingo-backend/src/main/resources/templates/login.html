<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo - Login</title>
    <style>
        /* Reset de estilos básicos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Fondo general de la página */
        body {
            background-color: #0b0f19; /* Azul oscuro profundo */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Tarjeta contenedora del Login */
        .login-card {
            background-color: #1e2640; /* Azul grisáceo de la tarjeta */
            width: 100%;
            max-width: 380px;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        /* Título ¡BINGO! */
        .login-title {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        /* Grupo de campos de entrada */
        .input-group {
            margin-bottom: 20px;
        }

        /* Estilos para los inputs (Usuario y Contraseña) */
        .login-input {
            width: 100%;
            padding: 14px 16px;
            background-color: #181e36; /* Fondo más oscuro para el input */
            border: 1px solid #2b3554; /* Borde sutil */
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        /* Efecto al hacer foco en los inputs */
        .login-input:focus {
            border-color: #b5ff60; 
        }

        /* Color del texto de ayuda (placeholder) */
        .login-input::placeholder {
            color: #566488;
        }

        /* Botón de Ingreso */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #b5ff60; /* Verde neón idéntico */
            border: none;
            border-radius: 6px;
            color: #0b0f19; /* Texto oscuro para contraste */
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 30px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        /* Efecto hover para el botón */
        .btn-submit:hover {
            background-color: #a2e650;
        }

        /* Efecto click */
        .btn-submit:active {
            transform: scale(0.98);
        }

        /* Enlace de registro abajo */
        .register-link {
            display: inline-block;
            color: #527874; /* Color verde opaco del texto inferior */
            font-size: 13px;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .register-link:hover {
            color: #b5ff60; /* Cambia al neón al pasar el mouse */
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 class="login-title">¡BINGO!</h1>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" class="px-3 login-input" placeholder="Introduce tu usuario" required>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" class="login-input" placeholder="********" required>
            </div>
            
            <button type="submit" class="btn-submit">Ingresar a la sala</button>
        </form>
        
        <a href="/registro" class="register-link">¿No tienes cuenta? Regístrate aquí</a>
    </div>

    <script>
        // Captura automáticamente la URL actual del host (sea local o nube)
        const BACKEND_URL = window.location.origin;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${BACKEND_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert(`¡Bienvenido de vuelta, ${data.player_name || username}! Ingresando a la sala...`);
                    
                    // Almacenamos la sesión de manera segura para usar los datos en el menú
                    localStorage.setItem('username', data.username || username);
                    localStorage.setItem('player_name', data.player_name || "Jugador");

                    // 🚀 REDIRECCIÓN AUTOMÁTICA ACTIVA: Ahora salta directo al Menú unificado
                    window.location.href = "/menu";
                } else {
                    alert(`Error: ${data.detail || "Credenciales incorrectas."}`);
                }
            } catch (error) {
                console.error("Error en la petición de autenticación:", error);
                alert("Mano, no se pudo establecer conexión con el servidor. Intenta de nuevo.");
            }
        });
    </script>

</body>
</html>
