<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo - Vista Juego</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
 
        body {
            background-color: #0b0f19;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 15px;
        }
 
        .game-mode-badge {
            background-color: #1a2238;
            color: #b5ff60;
            font-size: 13px;
            font-weight: 700;
            padding: 7px 18px;
            border-radius: 20px;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
        }
 
        .called-ball-display {
            background-color: #1a2238;
            width: 160px;
            padding: 16px 0;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 22px;
        }
 
        .called-ball-text {
            color: #b5ff60;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
 
        .bingo-board { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; }
        .bingo-row { display: flex; gap: 10px; }
 
        .grid-cell {
            width: 54px; height: 54px;
            border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            font-size: 16px; font-weight: 700;
            user-select: none;
            transition: all 0.15s ease;
        }
 
        .header-cell { background-color: #0d57ff; color: #fff; font-size: 18px; }
        .number-cell { background-color: #14192d; color: #fff; cursor: pointer; }
        .number-cell:not(.marked):not(.highlighted):hover { background-color: #1c233f; }
        .free-cell { background-color: #2b3554; color: #fff; font-size: 12px; letter-spacing: 0.5px; }
 
        /* Marcado por el jugador */
        .number-cell.marked { background-color: #00e6a6; color: #0b0f19; }
 
        /* Balota cantada por el servidor (resaltado azul) */
        .number-cell.called { border: 2px solid #b5ff60; }
        .number-cell.marked.called { background-color: #00e6a6; border: 2px solid #b5ff60; }
 
        /* Celdas que forman parte del patrón del modo de juego */
        .number-cell.pattern-hint { opacity: 1; }
        .number-cell:not(.pattern-hint):not(.free-cell) { opacity: 0.6; }
 
        .bingo-btn {
            background-color: #e11d48;
            color: #fff;
            font-size: 16px; font-weight: 700;
            padding: 14px 60px;
            border: none; border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }
        .bingo-btn:hover { background-color: #be123c; }
        .bingo-btn:active { transform: scale(0.98); }
 
        /* Modal de espera de modo */
        .modal-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(5,7,12,0.85);
            display: flex; justify-content: center; align-items: center;
            z-index: 999;
        }
        .modal-overlay.hidden { display: none; }
 
        .modal-card {
            background-color: #1e2640;
            border: 1px solid #2b3554;
            border-radius: 16px;
            width: 90%; max-width: 420px;
            padding: 40px 30px;
            text-align: center;
        }
        .modal-card h2 { color: #fff; font-size: 20px; margin-bottom: 14px; }
        .modal-card p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
        .modal-card .highlight { color: #ffb800; font-weight: 700; }
        .modal-card p { margin-bottom: 24px; }
        .btn-volver-menu {
            background-color: #2b3554;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }
        .btn-volver-menu:hover { background-color: #38456e; }
        .btn-volver-menu:active { transform: scale(0.97); }
    </style>
</head>
<body>
 
    <!-- Modal: modos de juego distintos -->
    <div class="modal-overlay" id="modeModal">
        <div class="modal-card">
            <h2>⚠️ Modo de juego distinto</h2>
            <p>
                Tú tienes seleccionado <span class="highlight" id="myModeLabel">-</span> pero tu oponente tiene <span class="highlight" id="opponentModeLabel">-</span>.<br><br>
                Ve a <strong>Opciones</strong> y pongan el mismo modo de juego para iniciar la partida.
            </p>
            <button class="btn-volver-menu" onclick="window.location.href='/menu'">Volver al menú</button>
        </div>
    </div>
 
    <div class="game-mode-badge" id="modeBadge">Modo: Cargando...</div>
 
    <div class="called-ball-display">
        <span class="called-ball-text" id="calledBall">--</span>
    </div>
 
    <div class="bingo-board" id="bingoBoard"></div>
 
    <button class="bingo-btn" id="bingoBtn">¡BINGO!</button>
 
    <script>
    document.addEventListener('DOMContentLoaded', () => {
 
        // ─── CONSTANTES DEL BINGO ESTÁNDAR ───────────────────────────────
        const COLUMNS = {
            B: { min: 1,  max: 15  },
            I: { min: 16, max: 30  },
            N: { min: 31, max: 45  },
            G: { min: 46, max: 60  },
            O: { min: 61, max: 75  }
        };
        const LETTERS = ['B','I','N','G','O'];
        const MODE_LABELS = {
            en_x: 'En X', en_o: 'En O', en_l: 'En L', carton_lleno: 'Cartón Lleno'
        };
 
        // ─── ESTADO DEL JUEGO ─────────────────────────────────────────────
        let cardNumbers = [];      // matriz 5x5 de números (null = FREE)
        let markedCells = new Set(); // posiciones marcadas por el jugador
        let calledNumbers = new Set(); // números cantados por el servidor
        let gameMode = localStorage.getItem('game_mode') || 'carton_lleno';
        let soundEnabled = localStorage.getItem('sound_enabled') !== 'false';
 
        // ─── GENERAR CARTÓN ALEATORIO ─────────────────────────────────────
        function generateCard() {
            cardNumbers = [];
            for (let col = 0; col < 5; col++) {
                const letter = LETTERS[col];
                const { min, max } = COLUMNS[letter];
                const pool = [];
                for (let n = min; n <= max; n++) pool.push(n);
                // Mezclar y tomar 5
                for (let i = pool.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [pool[i], pool[j]] = [pool[j], pool[i]];
                }
                cardNumbers.push(pool.slice(0, 5));
            }
            // cardNumbers[col][row] — la casilla FREE es col=2, row=2
        }
 
        // ─── OBTENER POSICIONES DEL PATRÓN ────────────────────────────────
        // Retorna Set de strings "col-row" que deben completarse
        function getPatternPositions(mode) {
            const positions = new Set();
            for (let col = 0; col < 5; col++) {
                for (let row = 0; row < 5; row++) {
                    if (col === 2 && row === 2) continue; // FREE, siempre excluida
 
                    let inPattern = false;
                    if (mode === 'carton_lleno') {
                        inPattern = true;
                    } else if (mode === 'en_x') {
                        inPattern = (col === row) || (col + row === 4);
                    } else if (mode === 'en_o') {
                        inPattern = (row === 0 || row === 4 || col === 0 || col === 4);
                    } else if (mode === 'en_l') {
                        // L: columna 0 completa + fila 4 completa
                        inPattern = (col === 0 || row === 4);
                    }
                    if (inPattern) positions.add(`${col}-${row}`);
                }
            }
            return positions;
        }
 
        // ─── RENDERIZAR TABLERO ───────────────────────────────────────────
        function renderBoard() {
            const board = document.getElementById('bingoBoard');
            board.innerHTML = '';
            const patternPos = getPatternPositions(gameMode);
 
            // Fila de cabeceras
            const headerRow = document.createElement('div');
            headerRow.className = 'bingo-row';
            LETTERS.forEach(l => {
                const cell = document.createElement('div');
                cell.className = 'grid-cell header-cell';
                cell.textContent = l;
                headerRow.appendChild(cell);
            });
            board.appendChild(headerRow);
 
            // Filas de números
            for (let row = 0; row < 5; row++) {
                const rowEl = document.createElement('div');
                rowEl.className = 'bingo-row';
                for (let col = 0; col < 5; col++) {
                    const cell = document.createElement('div');
                    const isFree = (col === 2 && row === 2);
                    const pos = `${col}-${row}`;
                    const num = cardNumbers[col][row];
 
                    if (isFree) {
                        cell.className = 'grid-cell free-cell';
                        cell.textContent = 'FREE';
                    } else {
                        cell.className = 'grid-cell number-cell';
                        cell.textContent = num;
                        cell.dataset.pos = pos;
                        cell.dataset.num = num;
 
                        if (patternPos.has(pos)) cell.classList.add('pattern-hint');
                        if (markedCells.has(pos)) cell.classList.add('marked');
                        if (calledNumbers.has(num)) cell.classList.add('called');
 
                        cell.addEventListener('click', () => {
                            if (!calledNumbers.has(num)) return; // solo marcar si fue cantada
                            if (markedCells.has(pos)) {
                                markedCells.delete(pos);
                                cell.classList.remove('marked');
                            } else {
                                markedCells.add(pos);
                                cell.classList.add('marked');
                            }
                        });
                    }
                    rowEl.appendChild(cell);
                }
                board.appendChild(rowEl);
            }
        }
 
        // ─── VALIDAR BINGO ────────────────────────────────────────────────
        function validateBingo() {
            const patternPos = getPatternPositions(gameMode);
            // Todas las posiciones del patrón deben estar marcadas
            for (const pos of patternPos) {
                if (!markedCells.has(pos)) return false;
            }
            return true;
        }
 
        // ─── SÍNTESIS DE VOZ (CANTAR BALOTA) ─────────────────────────────
        function speakBall(text) {
            if (!soundEnabled || !window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-ES';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }
 
        // ─── WEBSOCKET CON EL SERVIDOR ────────────────────────────────────
        const playerName = (localStorage.getItem('player_name') || 'Jugador').trim().replace(/\s+/g, '_');
        const loc = window.location;
        const protocol = loc.protocol === 'https:' ? 'wss://' : 'ws://';
        const wsUri = `${protocol}${loc.host}/ws/juego/${playerName}`;
 
        let socket;
        let pingInterval;
 
        function conectarWS() {
            socket = new WebSocket(wsUri);
 
            socket.onopen = () => {
                // Mandar modo de juego al servidor al conectar
                socket.send(JSON.stringify({
                    tipo: 'modo_juego',
                    mode: gameMode
                }));
                if (pingInterval) clearInterval(pingInterval);
                pingInterval = setInterval(() => {
                    if (socket.readyState === WebSocket.OPEN) socket.send('PING');
                }, 20000);
            };
 
            socket.onmessage = (event) => {
                if (event.data === 'PONG') return;
                try {
                    const data = JSON.parse(event.data);
 
                    // Modos distintos — mostrar modal
                    if (data.tipo === 'modo_mismatch') {
                        document.getElementById('myModeLabel').textContent = MODE_LABELS[data.my_mode] || data.my_mode;
                        document.getElementById('opponentModeLabel').textContent = MODE_LABELS[data.opponent_mode] || data.opponent_mode;
                        document.getElementById('modeModal').classList.remove('hidden');
                        return;
                    }
 
                    // Modos iguales — ocultar modal y confirmar modo
                    if (data.tipo === 'modo_ok') {
                        document.getElementById('modeModal').classList.add('hidden');
                        gameMode = data.mode;
                        document.getElementById('modeBadge').textContent = `Modo: ${MODE_LABELS[gameMode]}`;
                        renderBoard();
                        return;
                    }
 
                    // Nueva balota cantada
                    if (data.tipo === 'balota') {
                        const { numero, letra } = data;
                        calledNumbers.add(numero);
                        document.getElementById('calledBall').textContent = `${letra}-${numero}`;
                        speakBall(`${letra}, ${numero}`);
                        // Resaltar en el tablero si está en el cartón
                        document.querySelectorAll('.number-cell').forEach(cell => {
                            if (parseInt(cell.dataset.num) === numero) {
                                cell.classList.add('called');
                            }
                        });
                        return;
                    }
 
                    // Resultado de la validación del bingo
                    if (data.tipo === 'resultado_bingo') {
                        if (pingInterval) clearInterval(pingInterval);
                        window._redirectingToGame = true;
                        if (data.ganaste) {
                            window.location.href = '/ganador';
                        } else {
                            if (data.ganador) sessionStorage.setItem('ultimo_ganador', data.ganador);
                            window.location.href = '/perdedor';
                        }
                        return;
                    }
 
                } catch(e) { console.error('Error parseando mensaje:', e); }
            };
 
            socket.onclose = () => {
                if (pingInterval) clearInterval(pingInterval);
                if (window._redirectingToGame) return;
                setTimeout(conectarWS, 3000);
            };
 
            socket.onerror = () => socket.close();
        }
 
        // ─── BOTÓN BINGO ──────────────────────────────────────────────────
        document.getElementById('bingoBtn').addEventListener('click', () => {
            if (!socket || socket.readyState !== WebSocket.OPEN) return;
            // Enviamos al servidor las posiciones marcadas y el modo para que valide
            socket.send(JSON.stringify({
                tipo: 'claim_bingo',
                marked: Array.from(markedCells),
                card: cardNumbers,
                called: Array.from(calledNumbers),
                mode: gameMode
            }));
        });
 
        // ─── INIT ─────────────────────────────────────────────────────────
        generateCard();
        renderBoard();
        document.getElementById('modeBadge').textContent = `Modo: ${MODE_LABELS[gameMode]}`;
        document.getElementById('modeModal').classList.add('hidden'); // oculto por defecto
        conectarWS();
    });
    </script>
 
</body>
</html>
