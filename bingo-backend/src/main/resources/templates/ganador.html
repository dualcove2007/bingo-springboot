<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo - Victoria</title>
    <style>
        /* --- RESET GENERAL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19; /* Fondo oscuro profundo */
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 15px;
            position: relative;
        }

        /* --- DISPLAY BALOTA SUPERIOR (B-12) --- */
        .called-ball-display {
            background-color: #1a2238; 
            width: 160px;
            padding: 16px 0;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 35px; 
        }

        .called-ball-text {
            color: #b5ff60; 
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* --- CONTENEDOR DEL CARTÓN --- */
        .bingo-board {
            display: flex;
            flex-direction: column;
            gap: 12px; 
            margin-bottom: 40px;
        }

        .bingo-row {
            display: flex;
            gap: 12px; 
        }

        .grid-cell {
            width: 54px;   
            height: 54px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: 700;
            user-select: none;
        }

        .header-cell {
            background-color: #0d57ff; 
            color: #ffffff;
            font-size: 18px;
        }

        .number-cell {
            background-color: #14192d; 
            color: #ffffff;
        }

        .free-cell {
            background-color: #2b3554; 
            color: #ffffff;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        /* --- BOTÓN BINGO INFERIOR --- */
        .bingo-btn {
            background-color: #e11d48; 
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            padding: 14px 60px;
            border: none;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }


        /* ==========================================================================
           --- VENTANA FLOTANTE DE VICTORIA (MODAL DE ¡BINGO!) ---
           ========================================================================== */
        
        /* Capa oscura translúcida de fondo */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 7, 12, 0.75); /* Opaca el fondo un 75% */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999; /* Se posiciona encima de todo */
        }

        /* Tarjeta Central del Modal */
        .victory-card {
            background-color: #1e2640; /* Gris azulado original */
            border: 1px solid #2b3554;
            border-radius: 16px;
            width: 90%;
            max-width: 440px;
            padding: 40px 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Contenedor del título y el trofeo */
        .victory-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 24px;
        }

        .trophy-icon {
            font-size: 42px; /* Tamaño del trofeo idéntico a la imagen */
            line-height: 1;
        }

        .victory-title {
            color: #b5ff60; /* Verde neón de la felicitación */
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* Texto descriptivo de felicitación */
        .victory-message {
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            line-height: 1.6;
            max-width: 320px;
            margin-bottom: 30px;
        }

        /* Botón VOLVER AL MENU */
        .return-menu-btn {
            background-color: #b5ff60; /* Fondo verde neón */
            color: #0b0f19; /* Texto oscuro profundo */
            font-size: 15px;
            font-weight: 800;
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            max-width: 240px;
            box-shadow: 0 4px 15px rgba(181, 255, 96, 0.2);
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .return-menu-btn:hover {
            background-color: #9cd452;
            box-shadow: 0 6px 20px rgba(181, 255, 96, 0.3);
        }

        .return-menu-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div class="called-ball-display">
        <span class="called-ball-text">B-12</span>
    </div>

    <div class="bingo-board">
        <div class="bingo-row">
            <div class="grid-cell header-cell">B</div>
            <div class="grid-cell header-cell">I</div>
            <div class="grid-cell header-cell">N</div>
            <div class="grid-cell header-cell">G</div>
            <div class="grid-cell header-cell">O</div>
        </div>
        <div class="bingo-row">
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
        </div>
        <div class="bingo-row">
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
        </div>
        <div class="bingo-row">
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell free-cell">FREE</div>
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
        </div>
        <div class="bingo-row">
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
        </div>
        <div class="bingo-row">
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
            <div class="grid-cell number-cell">24</div>
        </div>
    </div>

    <button class="bingo-btn">¡BINGO!</button>


    <div class="modal-overlay">
        <div class="victory-card">
            
            <div class="victory-header">
                <span class="trophy-icon">🏆</span>
                <h1 class="victory-title">¡BINGO!</h1>
            </div>
            
            <p class="victory-message">
                ¡Felicitaciones, pa! Fuiste el primero en completar el bingo. El servidor validó tu cartón con éxito.
            </p>
            
            <button class="return-menu-btn" onclick="window.location.href='/menu'">Volver al menú</button>

        </div>
    </div>

    <script>
        // Limpiar estado de juego al llegar a esta pantalla
        localStorage.removeItem('game_mode_confirmed');
    </script>
</body>
</html>
