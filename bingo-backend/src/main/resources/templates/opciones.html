<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo - Opciones</title>
    <style>
        /* Reset de estilos básicos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
 
        body {
            background-color: #0b0f19; /* Fondo oscuro profundo */
            min-height: 100vh;
            display: flex;
            color: #ffffff;
            overflow: hidden;
        }
 
        /* --- BARRA LATERAL (SIDEBAR) --- */
        .sidebar {
            width: 240px;
            background-color: #1a2238; /* Azul grisáceo de la barra */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 20px;
            flex-shrink: 0;
        }
 
        .sidebar-top {
            display: flex;
            flex-direction: column;
            gap: 50px;
        }
 
        .logo {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            padding-left: 10px;
        }
 
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            list-style: none;
        }
 
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
 
        /* Pestaña Opciones activa */
        .nav-item.active {
            color: #b5ff60; /* Verde neón */
        }
 
        .nav-item.inactive {
            color: #5d6b89;
        }
 
        .nav-item.inactive:hover {
            color: #ffffff;
            background-color: #232d4a;
        }
 
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            color: #5d6b89;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer; /* Cambio a cursor pointer */
            transition: all 0.2s ease;
        }
 
        .logout-btn:hover {
            color: #ff6b6b;
            background-color: #232d4a;
        }
 
 
        /* --- CONTENIDO PRINCIPAL --- */
        .main-content {
            flex: 1;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end; 
        }
 
        /* Saludo superior derecho */
        .user-greeting {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
        }
 
        /* Contenedor central */
        .card-container {
            width: 100%;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 40px;
        }
 
        /* Tarjeta de Opciones */
        .options-card {
            background-color: #14192d;
            border: 1px solid #1f2742;
            border-radius: 12px;
            width: 100%;
            max-width: 540px;
            padding: 45px 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
 
        /* Filas con viñeta estilo punto */
        .option-row {
            display: flex;
            align-items: center;
            position: relative;
            padding-left: 18px;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }
 
        .option-row::before {
            content: "•";
            color: #ffffff;
            font-size: 20px;
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-53%);
        }
 
        /* Fila del Switch */
        .switch-container {
            justify-content: space-between;
            width: 100%;
        }
 
        /* --- SWITCH DE SONIDO --- */
        .switch {
            position: relative;
            display: inline-block;
            width: 76px;
            height: 38px;
        }
 
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
 
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #5d6b89;
            transition: .3s;
            border-radius: 34px;
        }
 
        .slider::before {
            position: absolute;
            content: "";
            height: 30px;
            width: 30px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
 
        input:checked + .slider {
            background-color: #00e6a6; /* Verde turquesa */
        }
 
        input:checked + .slider::before {
            transform: translateX(38px);
        }
 
        /* --- SECCIÓN DE RADIO BUTTONS CORREGIDA --- */
        .game-mode-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-left: 18px;
        }
 
        .radio-label {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            user-select: none;
        }
 
        /* Ocultar radio nativo */
        .radio-label input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }
 
        /* Círculo falso por defecto (Gris apagado para todos) */
        .checkmark {
            height: 24px;
            width: 24px;
            background-color: #5d6b89; 
            border-radius: 50%;
            transition: background-color 0.2s ease;
        }
 
        /* Al seleccionar las opciones normales, cambian a BLANCO */
        .radio-label input:checked ~ .checkmark {
            background-color: #ffffff; 
        }
 
        /* Texto informativo inferior */
        .info-text {
            font-size: 14px;
            font-weight: 600;
            color: #cbd5e1;
            line-height: 1.5;
        }
    </style>
</head>
<body>
 
    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="logo">BINGO</div>
            
            <nav>
                <ul class="nav-menu">
                    <li>
                        <!-- 🔥 CORRECCIÓN: Ahora te redirige de vuelta al menú / lobby principal -->
                        <a href="/menu" class="nav-item inactive">
                            <span>🎮</span> Jugar en Línea
                        </a>
                    </li>
                    <li>
                        <a href="/opciones" class="nav-item active">
                            <span>⚙️</span> Opciones
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
 
        <!-- 🔥 CORRECCIÓN: Se agrega ID único para controlar el cierre de sesión en JS -->
        <div id="logoutBtn" class="logout-btn">
            <span>🚪</span> Cerrar Sesión
        </div>
    </aside>
 
    <main class="main-content">
        
        <!-- 🔥 DINÁMICO: Cambiado a ID para renderizar el nombre real desde el localStorage -->
        <h2 class="user-greeting" id="userGreeting">Hola, Jugador</h2>
        
        <div class="card-container">
            <div class="options-card">
                
                <div class="option-row switch-container">
                    <span>Efectos de Sonido (Cantar Balotas)</span>
                    <label class="switch">
                        <input type="checkbox" id="soundSwitch" checked>
                        <span class="slider"></span>
                    </label>
                </div>
 
                <div class="option-row">
                    <span>Modo de juego asignado:</span>
                </div>
 
                <div class="game-mode-section">
                    <label class="radio-label">
                        <input type="radio" name="game-mode" value="en_x">
                        <span class="checkmark"></span>
                        En X
                    </label>
                    
                    <label class="radio-label">
                        <input type="radio" name="game-mode" value="en_o">
                        <span class="checkmark"></span>
                        En O
                    </label>
                    
                    <label class="radio-label">
                        <input type="radio" name="game-mode" value="en_l">
                        <span class="checkmark"></span>
                        En L
                    </label>
                    
                    <label class="radio-label carton-lleno">
                        <input type="radio" name="game-mode" value="carton_lleno">
                        <span class="checkmark"></span>
                        Cartón Lleno
                    </label>
                </div>
 
                <div class="option-row">
                    <p class="info-text">
                        El servidor validará el cartón inmediatamente al recibir el comando BINGO.
                    </p>
                </div>
 
            </div>
        </div>
 
    </main>
 
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const storedName = localStorage.getItem("player_name");
            if (storedName) {
                document.getElementById("userGreeting").innerText = "Hola, " + storedName.replace(/_/g, " ");
            }
 
            const modeValues = ["en_x", "en_o", "en_l", "carton_lleno"];
            const radios = document.querySelectorAll('input[name="game-mode"]');
            const savedMode = localStorage.getItem("game_mode") || "carton_lleno";
 
            radios.forEach((radio, i) => {
                radio.value = modeValues[i];
                radio.checked = (modeValues[i] === savedMode);
                radio.addEventListener("change", () => {
                    localStorage.setItem("game_mode", radio.value);
                });
            });
 
            const soundSwitch = document.getElementById('soundSwitch');
            const savedSound = localStorage.getItem("sound_enabled");
            if (savedSound !== null) soundSwitch.checked = savedSound === "true";
            soundSwitch.addEventListener("change", () => {
                localStorage.setItem("sound_enabled", soundSwitch.checked.toString());
            });
 
            document.getElementById("logoutBtn").addEventListener("click", () => {
                localStorage.clear();
                window.location.href = "/";
            });
        });
    </script>
 
</body>
</html>
